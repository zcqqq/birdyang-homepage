/* ─── ROUTER ─── */

function getRoute() {
  const hash = location.hash.slice(1) || 'home';
  return hash;
}

function render() {
  const route = getRoute();
  const app = document.getElementById('app');

  if (route === 'home') {
    app.innerHTML = renderHome();
  } else if (route === 'insurance') {
    app.innerHTML = renderInsuranceHome();
  } else if (route === 'hr') {
    app.innerHTML = renderHRHome();
  } else if (route === 'immigration') {
    app.innerHTML = renderImmigrationHome();
  } else if (route.startsWith('team/')) {
    const id = route.replace('team/', '');
    app.innerHTML = renderTeamProfile(id);
  } else if (servicePages[route]) {
    app.innerHTML = serviceDetailPage(servicePages[route]);
  } else {
    app.innerHTML = renderHome();
  }

  window.scrollTo(0, 0);
  initReveal();
}

function initReveal() {
  document.querySelectorAll('.reveal').forEach(function(el) {
    new IntersectionObserver(function(entries, obs) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, {threshold: 0.1}).observe(el);
  });
}

/* ─── ACCORDION TOGGLE ─── */
document.addEventListener('click', function(e) {
  var header = e.target.closest('.accordion-header');
  if (header) header.parentElement.classList.toggle('open');
});

/* ─── INIT ─── */
window.addEventListener('hashchange', render);
render();

})();
</script>
