<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulting Services | Insurance, HR & Immigration | Bird & Yang</title>
<meta name="description" content="Bird & Yang Consulting provides practical support across immigration, HR, insurance, and business matters.">
<link rel="canonical" href="https://birdyang.pages.dev/consulting.html">
<link rel="alternate" hreflang="en" href="https://birdyang.pages.dev/consulting.html">
<link rel="alternate" hreflang="zh" href="https://birdyang.pages.dev/zh/consulting.html">
<link rel="alternate" hreflang="x-default" href="https://birdyang.pages.dev/consulting.html">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVIGATION -->
<div id="site-nav"></div>
<script src="/components/nav.js"></script>
<script>renderNav({active:"consulting",lang:"en"})</script>

<main id="app"></main>

<!-- FOOTER -->
<div id="site-footer"></div>
<script src="/components/footer.js"></script>
<script>renderFooter({lang:"en"})</script>

<script src="/components/section-header.js"></script>
<script src="/components/team-profile.js"></script>
<script>
(function(){

function renderHome() {
  return `
  <div class="hero-banner hero-glow" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:url('assets/images/28_ConsultingHome01_FirstSight.png') center/cover no-repeat">
    <h1>CONSULTING SERVICES</h1>
    <p class="hero-sub">Helping You Move Forward with Confidence</p>
  </div>

  <section class="bg-cream reveal">
    <div class="container">
      ${sectionAbout('ABOUT OUR CONSULTING SERVICES', 'At Bird &amp; Yang, our consulting services connect practical support across insurance, HR, immigration, and business matters. We help individuals, families, and businesses understand their options, manage risk, and move forward with clarity and confidence. Working alongside our legal and accounting teams, we offer integrated guidance that connects professional expertise with real-life needs.')}
    </div>
  </section>

  <section class="bg-white reveal">
    <div class="container">
      ${sectionHeader('WHAT WE DO', 'Areas of Practice')}
      <div class="cards-grid">
        <a class="service-card" href="insurance.html">
          <div class="card-icon-area" style="background:url('assets/images/28_ConsultingHome02_Insurance.png') center/cover no-repeat;height:140px"></div>
          <div class="card-body">
            <h3>INSURANCE</h3>
            <p>Securing Your Future with Expertise</p>
            <span class="learn-more">Learn More &rarr;</span>
          </div>
        </a>
        <a class="service-card" href="hr.html">
          <div class="card-icon-area" style="background:url('assets/images/28_ConsultingHome03_HR.png') center/cover no-repeat;height:140px"></div>
          <div class="card-body">
            <h3>HR CONSULTING</h3>
            <p>Supporting Your Success with Resources</p>
            <span class="learn-more">Learn More &rarr;</span>
          </div>
        </a>
        <a class="service-card" href="immigration.html">
          <div class="card-icon-area" style="background:url('assets/images/28_ConsultingHome04_Immigration.png') center/cover no-repeat;height:140px"></div>
          <div class="card-body">
            <h3>IMMIGRATION</h3>
            <p>Realizing Your Pathway with Efficiency</p>
            <span class="learn-more">Learn More &rarr;</span>
          </div>
        </a>
      </div>
    </div>
  </section>

  <section class="bg-cream reveal">
    <div class="container">
      ${renderTeamGrid(['aimee-yang','julia-huang','rockie-wei'])}
    </div>
  </section>
  `;
}

function render() {
  var hash = location.hash.slice(1) || 'home';
  var app = document.getElementById('app');

  if (hash.indexOf('team/') === 0) {
    var id = hash.slice(5);
    var html = renderTeamProfileHTML(id, { backHash: '#team', backText: 'BACK TO OUR TEAM' });
    app.innerHTML = html || renderHome();
    window.scrollTo(0, 0);
  } else if (hash === 'team') {
    app.innerHTML = renderHome();
    setTimeout(function(){ var g = document.querySelector('.team-grid'); if (g) { var nav = document.querySelector('nav'); var navH = nav ? nav.offsetHeight : 76; var sec = g.closest('section'); var t = (sec || g).getBoundingClientRect().top + window.scrollY - navH - 20; window.scrollTo({ top: t, behavior: 'smooth' }); } }, 50);
  } else {
    app.innerHTML = renderHome();
    window.scrollTo(0, 0);
  }
  document.querySelectorAll('.reveal').forEach(function(el) {
    new IntersectionObserver(function(entries, obs) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, {threshold: 0.1}).observe(el);
  });
}

window.addEventListener('hashchange', render);
render();

})();
</script>

<script src="/components/chatbot.js"></script>
<script>renderChatbot({lang:"en"})</script>
</body>
</html>
