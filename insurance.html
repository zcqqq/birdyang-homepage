function serviceDetailPage(opts) {
  const itemsHtml = opts.accordions.map(item => `
    <div class="service-item">
      <div class="service-item-icon">●</div>
      <div><h4>${item.title}</h4><p>${item.desc}</p></div>

    </div>
  `).join('');

  return `
    <div style="min-height:100vh;display:flex;flex-direction:column">
      <div class="hero-banner" style="padding:100px 5% 30px;flex-shrink:0">
        <div class="breadcrumb"><a href="consulting.html">CONSULTING</a> &gt; <a href="#home">INSURANCE</a> &gt; ${opts.title}</div>
        <h1>${opts.title}</h1>
        ${opts.heroSub ? `<p class="hero-sub">${opts.heroSub}</p>` : ''}

      ${opts.img ? `<div style="flex:1;background:url('${opts.img}') center/cover no-repeat;min-height:200px"></div>` : ''}
    </div>

    <section>
      <div class="container">
        <a class="back-link" href="${opts.backHash}">${opts.backText}</a>
        <div class="two-col">

/* ─── ROUTER ─── */

function render() {
  const hash = location.hash.slice(1) || 'home';
  const app = document.getElementById('app');

  if (hash === 'home' || hash === '') {
    app.innerHTML = renderHome();
  } else if (servicePages[hash]) {
    app.innerHTML = serviceDetailPage(servicePages[hash]);
  } else {
    app.innerHTML = renderHome();
  }

  window.scrollTo(0, 0);
  initReveal();
}

function initReveal() {
  document.querySelectorAll('.reveal').forEach(function(el) {
    new IntersectionObserver(function(entries, obs) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, {threshold: 0.1}).observe(el);
  });
}

/* ─── INIT ─── */
window.addEventListener('hashchange', render);
render();

})();
