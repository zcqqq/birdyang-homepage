function renderServiceDetail(key) {

    if (item.group && item.group !== currentGroup) {
      currentGroup = item.group;
      groupLabel = `<div style="margin-top:24px;margin-bottom:12px;font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)">${item.group}</div>`;
    }
    const featuredBadge = item.featured ? '<span class="featured-badge">Featured</span>' : '';
    const linkWrap = item.link ? `<a href="${item.link}" style="color:var(--gold);font-size:.78rem;font-weight:600;margin-top:8px;display:inline-block">View details &rarr;</a>` : '';
    return `${groupLabel}

        <div class="accordion-body"><p>${item.desc}</p>${linkWrap}</div>

/* ─── ROUTER ─── */

function getRoute() {
  const hash = location.hash.slice(1) || 'home';
  return hash;
}

function render() {
  const route = getRoute();
  const app = document.getElementById('app');

  if (route === 'home') {
    app.innerHTML = renderHome();
  } else if (route === 'business-investor') {
    app.innerHTML = renderBusinessInvestor();
  } else if (route.startsWith('team/')) {
    const id = route.replace('team/', '');
    app.innerHTML = renderTeamProfile(id);
  } else if (servicePages[route]) {
    app.innerHTML = renderServiceDetail(route);
  } else {
    app.innerHTML = renderHome();
  }

  window.scrollTo(0, 0);
}

/* ─── ACCORDION TOGGLE ─── */
document.addEventListener('click', function(e) {
  var header = e.target.closest('.accordion-header');
  if (header) header.parentElement.classList.toggle('open');
});

/* ─── INIT ─── */
window.addEventListener('hashchange', render);
render();

})();
