function renderServiceDetail(key) {
  const page = servicePages[key];
  if (!page) return renderHome();

  let currentGroup = '';
  const accordionHtml = page.items.map(item => {
    let groupLabel = '';
    if (item.group && item.group !== currentGroup) {
      currentGroup = item.group;
      groupLabel = `<div style="margin-top:24px;margin-bottom:12px;font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)">${item.group}</div>`;
    }
    const featuredBadge = item.featured ? '<span class="featured-badge">Featured</span>' : '';
    const linkWrap = item.link ? `<a href="${item.link}" style="color:var(--gold);font-size:.78rem;font-weight:600;margin-top:8px;display:inline-block">View details &rarr;</a>` : '';
    return `${groupLabel}
      <div class="accordion">
        <div class="accordion-header">${item.title}${featuredBadge}</div>
        <div class="accordion-body"><p>${item.desc}</p>${linkWrap}</div>
      </div>`;
  }).join('');

  return `
    <div class="hero-banner">
      <div class="breadcrumb"><a href="#home">LEGAL SERVICES</a> &gt; ${page.breadcrumb}</div>
      <h1>${page.title}</h1>
    </div>

    <section>
      <div class="container">
        <a class="back-link" href="#home">BACK TO LEGAL SERVICES</a>
        <div class="two-col">
          <div class="main-content">
            <p style="font-size:.88rem;color:var(--charcoal);line-height:1.85;margin-bottom:32px">${page.intro}</p>
            ${accordionHtml}
          </div>
          <div class="sidebar">
            <div class="sidebar-card">
              <h3>WHY BIRD &amp; YANG</h3>
              ${page.sidebar.map(s => `
                <div class="why-item">
                  <h4>${s.title}</h4>
                  <p>${s.desc}</p>
                </div>
              `).join('')}
            </div>
            <a href="contact.html" class="cta-btn primary" style="width:100%;display:block;text-align:center">BOOK A CONSULTATION</a>
          </div>
        </div>
      </div>
    </section>
  `;
}

function renderTeamProfile(id) {
  const profile = teamProfiles[id];
  if (!profile) return renderHome();

  return `
    <div class="hero-banner">
      <p class="breadcrumb">OUR TEAM</p>
      <h1>${profile.name}</h1>
      <p class="hero-sub">${profile.role}</p>
    </div>

    <section>
      <div class="container">
        <a class="back-link" href="#home">BACK TO OUR TEAM</a>
        <div class="profile-layout">
          <div style="text-align:center">
            <img class="profile-photo" src="${profile.photo}" alt="${profile.name}">
          </div>
          <div>
            <h2 class="profile-name">${profile.name}</h2>
            <p class="profile-role">${profile.role}</p>
            <p class="profile-bio">${profile.bio}</p>

            <div class="expertise-badges">
              ${profile.expertise.map(e => `<span>${e}</span>`).join('')}
            </div>

            <p style="font-size:.85rem;color:var(--charcoal);line-height:1.8;margin-bottom:24px">${profile.summary}</p>

            <div class="profile-highlights">
              ${profile.highlights.map(h => `
                <div class="highlight">
                  <h4>${h.title}</h4>
                  <p>${h.desc}</p>
                </div>
              `).join('')}
            </div>

            <div class="profile-contact">
              <p><strong>Phone:</strong> <a href="tel:${profile.contact.phone.replace(/\s/g,'')}">${profile.contact.phone}</a></p>
              <p><strong>Email:</strong> <a href="mailto:${profile.contact.email}">${profile.contact.email}</a></p>
              ${profile.contact.qualifications.length ? profile.contact.qualifications.map(q => `<p><strong>Qualification:</strong> ${q}</p>`).join('') : ''}
            </div>
          </div>
        </div>
      </div>
    </section>
  `;
}

/* ─── ROUTER ─── */

function getRoute() {
  const hash = location.hash.slice(1) || 'home';
  return hash;
}

function render() {
  const route = getRoute();
  const app = document.getElementById('app');

  if (route === 'home') {
    app.innerHTML = renderHome();
  } else if (route === 'business-investor') {
    app.innerHTML = renderBusinessInvestor();
  } else if (route.startsWith('team/')) {
    const id = route.replace('team/', '');
    app.innerHTML = renderTeamProfile(id);
  } else if (servicePages[route]) {
    app.innerHTML = renderServiceDetail(route);
  } else {
    app.innerHTML = renderHome();
  }

  window.scrollTo(0, 0);
}

/* ─── ACCORDION TOGGLE ─── */
document.addEventListener('click', function(e) {
  var header = e.target.closest('.accordion-header');
  if (header) header.parentElement.classList.toggle('open');
});

/* ─── INIT ─── */
window.addEventListener('hashchange', render);
render();

})();
