function renderServiceDetail(key) {
  const page = servicePages[key];
  if (!page) return renderHome();

  let currentGroup = '';
  const itemsHtml = page.items.map(item => {
    let groupLabel = '';
    if (item.group && item.group !== currentGroup) {
      currentGroup = item.group;
      groupLabel = `<div style="grid-column:1/-1;margin-top:16px;font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)">${item.group}</div>`;
    }
    const featuredBadge = item.featured ? ' <span style="font-size:.6rem;background:var(--gold);color:var(--white);padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle">Featured</span>' : '';
    const linkWrap = item.link ? `<a href="${item.link}" style="color:var(--gold);font-size:.78rem;font-weight:600;display:block;margin-top:6px">View details &rarr;</a>` : '';
    if (item.featured) {
      return `${groupLabel}
        <div class="service-item featured-item" style="grid-column:1/-1">
          <div class="service-item-icon">★</div>
          <div style="flex:1">
            <h4 style="cursor:pointer" onclick="this.closest('.featured-item').classList.toggle('expanded');event.stopPropagation()">${item.title}${featuredBadge} <span class="expand-arrow" style="float:right;font-size:.8rem;color:var(--gold)">▼</span></h4>
            <p>${item.desc}</p>
            <div class="featured-expand" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid rgba(0,0,0,.06)">
              <p style="font-size:.82rem;color:var(--charcoal);line-height:1.7;margin-bottom:8px">Strategic immigration guidance for investors, entrepreneurs, and business owners seeking opportunities in New Zealand.</p>
              ${linkWrap}
            </div>
          </div>
        </div>`;
    }
    return `${groupLabel}
      <div class="service-item">
        <div class="service-item-icon">●</div>
        <div>
          <h4>${item.title}${featuredBadge}</h4>
          <p>${item.desc}</p>${linkWrap}
        </div>
      </div>`;
  }).join('');

  return `
    <div style="min-height:100vh;display:flex;flex-direction:column">
      <div class="hero-banner" style="padding:100px 5% 30px;flex-shrink:0">

function renderTeamProfile(id) {
  return renderTeamProfileHTML(id, {backHash: '#team', backText: 'BACK TO OUR TEAM'}) || renderHome();
}

/* ─── ROUTER ─── */

function getRoute() {
  const hash = location.hash.slice(1) || 'home';
  return hash;
}

function render() {
  const route = getRoute();
  const app = document.getElementById('app');

  if (route === 'home') {
    app.innerHTML = renderHome();
    window.scrollTo(0, 0);
  } else if (route === 'services') {
    app.innerHTML = renderHome();
    setTimeout(function(){ var el = document.getElementById('services'); if (el) { var nav = document.querySelector('nav'); var navH = nav ? nav.offsetHeight : 76; var t = el.getBoundingClientRect().top + window.scrollY - navH - 20; window.scrollTo({ top: t, behavior: 'smooth' }); } else { window.scrollTo(0, 0); } }, 50);
  } else if (route === 'team') {
    app.innerHTML = renderHome();
    setTimeout(function(){ var g = document.querySelector('.team-grid'); if (g) { var nav = document.querySelector('nav'); var navH = nav ? nav.offsetHeight : 76; var sec = g.closest('section'); var t = (sec || g).getBoundingClientRect().top + window.scrollY - navH - 20; window.scrollTo({ top: t, behavior: 'smooth' }); } }, 50);
  } else if (route === 'business-investor') {
    app.innerHTML = renderBusinessInvestor();
    window.scrollTo(0, 0);
  } else if (route.startsWith('team/')) {
    const id = route.replace('team/', '');
    app.innerHTML = renderTeamProfile(id);
    window.scrollTo(0, 0);
  } else if (servicePages[route]) {
    app.innerHTML = renderServiceDetail(route);
    window.scrollTo(0, 0);
  } else {
    app.innerHTML = renderHome();
    window.scrollTo(0, 0);
  }
}

/* ─── ACCORDION TOGGLE ─── */
document.addEventListener('click', function(e) {
  var header = e.target.closest('.accordion-header');
  if (header) header.parentElement.classList.toggle('open');
});

/* ─── INIT ─── */
window.addEventListener('hashchange', render);
render();
