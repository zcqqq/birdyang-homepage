/* ─── ROUTER ─── */

function render() {
  const hash = location.hash.slice(1) || 'home';
  const app = document.getElementById('app');

  if (hash === 'home' || hash === '') {
    app.innerHTML = renderHome();
    window.scrollTo(0, 0);
  } else if (hash === 'services') {
    app.innerHTML = renderHome();
    setTimeout(function(){ var el = document.getElementById('services'); if (el) { var nav = document.querySelector('nav'); var navH = nav ? nav.offsetHeight : 76; var t = el.getBoundingClientRect().top + window.scrollY - navH - 20; window.scrollTo({ top: t, behavior: 'smooth' }); } else { window.scrollTo(0, 0); } }, 50);
  } else if (servicePages[hash]) {
    app.innerHTML = serviceDetailPage(servicePages[hash]);
    window.scrollTo(0, 0);
  } else {
    app.innerHTML = renderHome();
    window.scrollTo(0, 0);
  }

  initReveal();
}

function initReveal() {
  document.querySelectorAll('.reveal').forEach(function(el) {
    new IntersectionObserver(function(entries, obs) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, {threshold: 0.1}).observe(el);
  });
}

/* ─── INIT ─── */
window.addEventListener('hashchange', render);
render();

})();
