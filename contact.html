/* ─── ROUTER ─── */
function route() {
  var hash = window.location.hash.slice(1) || 'home';
  var app = document.getElementById('app');
  switch(hash) {
    case 'book': app.innerHTML = renderBook(); break;
    default: app.innerHTML = renderHome(); break;
  }
  window.scrollTo(0, 0);
  bindForms();
  bindTabs();
  revealElements();
}

/* ─── FORM HANDLING ─── */
function submitForm(form, successId, btnText) {
  var btn = form.querySelector('button[type="submit"]');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  fetch('/api/contact', { method: 'POST', body: new FormData(form) })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.success) {
        form.style.display = 'none';
        document.getElementById(successId).style.display = 'block';
      } else {
        btn.disabled = false;
        btn.textContent = btnText;
        alert('Something went wrong. Please try again or email us directly at info@birdyang.co.nz');
      }
    })
    .catch(function() {
      btn.disabled = false;
      btn.textContent = btnText;
      alert('Connection error. Please try again.');
    });
}

function bindForms() {
  var contactForm = document.getElementById('contact-form');
  if (contactForm) {
    contactForm.addEventListener('submit', function(e) {
      e.preventDefault();
      submitForm(contactForm, 'contact-success', 'SUBMIT ENQUIRY');
    });
  }
  var bookForm = document.getElementById('book-form');
  if (bookForm) {
    bookForm.addEventListener('submit', function(e) {
      e.preventDefault();
      submitForm(bookForm, 'book-success', 'REQUEST CONSULTATION');
    });
  }
}

/* ─── TABS ─── */
function bindTabs() {
  var tabs = document.querySelectorAll('#doc-tabs .tab');
  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      tabs.forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
    });
  });
}

/* ─── SCROLL REVEAL ─── */
function revealElements() {
  var els = document.querySelectorAll('.reveal');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });
  els.forEach(function(el) { observer.observe(el); });
}

/* ─── NAV SCROLL EFFECT ─── */
window.addEventListener('scroll', function() {
  var nav = document.querySelector('nav');
  if (nav) {
    if (window.scrollY > 40) { nav.classList.add('scrolled'); }
    else { nav.classList.remove('scrolled'); }
  }
});

window.addEventListener('hashchange', route);
route();
