/* ─── Hash Router ─── */
function route(){
  var hash = location.hash.slice(1) || 'home';
  var html = '';
  switch(hash){
    case 'home': html = pageHome(); break;
    case 'annual-accounts': html = pageAnnualAccounts(); break;
    case 'taxation': html = pageTaxation(); break;
    case 'budget-forecast': html = pageBudgetForecast(); break;
    case 'cash-flow': html = pageCashFlow(); break;
    case 'business-plans': html = pageBusinessPlans(); break;
    case 'asset-management': html = pageAssetManagement(); break;
    case 'trust-accounting': html = pageTrustAccounting(); break;
    case 'team/heather-chao': html = renderTeamProfileHTML('heather-chao', {backHash:'#team', backText:'BACK TO OUR TEAM'}); break;
    case 'team/ming-lu': html = renderTeamProfileHTML('ming-lu', {backHash:'#team', backText:'BACK TO OUR TEAM'}); break;
    case 'team/ally-liao': html = renderTeamProfileHTML('ally-liao', {backHash:'#team', backText:'BACK TO OUR TEAM'}); break;
    case 'team':
      html = pageHome();
      document.getElementById('app').innerHTML = html;
      setTimeout(function(){ var g = document.querySelector('.team-grid'); if (g) { var nav = document.querySelector('nav'); var navH = nav ? nav.offsetHeight : 76; var sec = g.closest('section'); var t = (sec || g).getBoundingClientRect().top + window.scrollY - navH - 20; window.scrollTo({ top: t, behavior: 'smooth' }); } }, 50);
      initAccordions(); initReveal(); return;
    default: html = pageHome();
  }
  document.getElementById('app').innerHTML = html;
  window.scrollTo(0,0);
  initAccordions();
  initReveal();
}

window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', route);

/* ─── Accordion Toggle ─── */
function initAccordions(){
  document.querySelectorAll('.accordion-header').forEach(function(btn){
    btn.addEventListener('click', function(){
      var body = this.nextElementSibling;
      var open = this.classList.contains('active');
      this.classList.toggle('active', !open);
      body.classList.toggle('active', !open);
    });
  });
}

/* ─── Reveal on Scroll ─── */
function initReveal(){
  var els = document.querySelectorAll('.reveal');
  if(!els.length) return;
  var observer = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){ e.target.classList.add('visible'); }
    });
  }, {threshold:0.15});
  els.forEach(function(el){ observer.observe(el); });
}

/* ─── Nav Scroll Effect ─── */
window.addEventListener('scroll', function(){
  var nav = document.querySelector('nav, .site-nav, #site-nav');
  if(!nav) return;
  if(window.scrollY > 60){
    nav.classList.add('scrolled');
    nav.classList.remove('transparent');
  } else {
    nav.classList.remove('scrolled');
    nav.classList.add('transparent');
  }
});

/* ─── Helper: Service Detail Page ─── */
function serviceDetail(opts){

    + (opts.img ? '<div style="flex:1;background:url('+opts.img+') center/cover no-repeat;min-height:200px"></div>' : '')
    + '</div>'
    + '<section class="container"><a href="#home" class="back-link">&larr; Back to Accounting Services</a>'
    + '<div class="two-col"><div class="main-content">'
    + '<h2 style="font-size:1.4rem;font-weight:700;color:var(--blue);margin-bottom:12px">'+opts.title+'</h2>'
    + '<p style="font-size:.92rem;color:var(--charcoal);line-height:1.85;margin-bottom:24px">'+opts.intro+'</p>'
    + '<p style="font-size:.82rem;font-weight:700;color:var(--charcoal);margin-bottom:16px">Our services include:</p>'
    + '<div class="service-items-grid">'+itemsHTML+'</div>'
    + '</div><aside class="sidebar"><div class="sidebar-card">'
    + '<h3>WHY BIRD &amp; YANG</h3>'
    + whyHTML
    + '</div><a href="contact.html#book" class="cta-btn primary" style="width:100%;display:block;text-align:center;margin-top:20px">BOOK A CONSULTATION</a></aside></div></section>';
}
