function renderTeamGrid(memberIds, opts) {
  opts = opts || {};
  var cards = memberIds.map(function(id) {
    var p = TEAM_PROFILES_ZH[id];
    if (!p) return '';
    var href = (opts.hashPrefix || '#team/') + id;
    return '<a class="team-card" href="' + href + '"><img src="' + (opts.imgBase || '') + p.photo + '" alt="' + p.name + '"><h4>' + p.name + '</h4><p>' + p.role + '</p></a>';
  }).join('');
  return sectionHeader('我们的团队', '专业团队') + '<div class="team-grid">' + cards + '</div>';
}

function renderTeamProfileHTML(id, opts) {
  opts = opts || {};
  var profile = TEAM_PROFILES_ZH[id];
  if (!profile) return null;

  var imgBase = opts.imgBase || '';
  var backHash = opts.backHash || '#home';
  var backText = opts.backText || '返回我们的团队';

  var highlightsHTML = profile.highlights.map(function(h) {
    return '<div class="highlight"><h4><img src="' + imgBase + '../assets/icons/icon_star.png" style="width:16px;height:16px;vertical-align:middle;margin-right:6px">' + h.title + '</h4><p>' + h.desc + '</p></div>';
  }).join('');

  var expertiseHTML = profile.expertise.map(function(e) {
    return '<span>' + e + '</span>';
  }).join('');

  var qualificationsHTML = '';
  if (profile.contact.qualifications && profile.contact.qualifications.length) {
    qualificationsHTML = '<h3>教育背景</h3><ul style="list-style:none;padding:0;font-size:.85rem;color:var(--charcoal);line-height:2">' +
      profile.contact.qualifications.map(function(q) { return '<li>' + q + '</li>'; }).join('') + '</ul>';
  }

  return '<div class="hero-banner team-hero" style="background:url(\'' + imgBase + '../assets/images/11_Team_memberPageV7.png\') center/cover no-repeat">' +
      '<p class="breadcrumb">我们的团队</p>' +
      '<h1>' + profile.name + '</h1>' +
      '<p class="hero-sub">' + profile.role + '</p>' +
    '</div>' +
    '<section><div class="container">' +
      '<a class="back-link" href="' + backHash + '">' + backText + '</a>' +
      '<div class="profile-top">' +
        '<div class="profile-photo-col">' +
          '<img class="profile-photo" src="' + profile.photo + '" alt="' + profile.name + '" style="border-radius:8px;width:200px;height:auto;border:none">' +
        '</div>' +
        '<div>' +
          '<h2 class="profile-name">' + profile.name + '</h2>' +
          '<p class="profile-role">' + profile.role + '</p>' +
          '<p class="profile-bio">' + profile.bio + '</p>' +
        '</div>' +
      '</div>' +
      '<div class="profile-summary-section" style="margin-top:32px;margin-bottom:32px">' +
        '<h3 style="font-size:.7rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:12px">个人简介</h3>' +
        '<p style="font-size:.85rem;color:var(--charcoal);line-height:1.85">' + profile.summary + '</p>' +
      '</div>' +
      '<div class="profile-body">' +
        '<div class="profile-main">' +
          '<h3>专业领域</h3>' +
          '<div class="expertise-badges">' + expertiseHTML + '</div>' +
          qualificationsHTML +
        '</div>' +
        '<div class="profile-sidebar">' +
          '<h3>个人亮点</h3>' +
          '<div class="profile-highlights">' + highlightsHTML + '</div>' +
          '<a href="contact.html#book" class="cta-btn primary" style="width:100%;display:block;text-align:center;margin-top:20px">预约咨询</a>' +
          '<div class="profile-contact" style="margin-top:16px">' +
            '<p><a href="tel:' + profile.contact.phone.replace(/\s/g, '') + '">' + profile.contact.phone + '</a></p>' +
            '<p><a href="mailto:' + profile.contact.email + '">' + profile.contact.email + '</a></p>' +

/* ═══════════════════════════════════════════
   ROUTER
   ═══════════════════════════════════════════ */

function render() {
  const route = location.hash.slice(1) || 'home';
  const app = document.getElementById('app');

  if (route === 'home') {
    app.innerHTML = renderHome();
    window.scrollTo(0, 0);
  } else if (route === 'team') {
    app.innerHTML = renderHome();
    setTimeout(function(){ var g = document.querySelector('.team-grid'); if (g) { var nav = document.querySelector('nav'); var navH = nav ? nav.offsetHeight : 76; var sec = g.closest('section'); var t = (sec || g).getBoundingClientRect().top + window.scrollY - navH - 20; window.scrollTo({ top: t, behavior: 'smooth' }); } }, 50);
  } else if (route === 'business-investor') {
    app.innerHTML = renderBusinessInvestor();
    window.scrollTo(0, 0);
  } else if (route.startsWith('team/')) {
    const id = route.replace('team/', '');
    app.innerHTML = renderTeamProfile(id);
    window.scrollTo(0, 0);
  } else if (servicePages[route]) {
    app.innerHTML = renderServiceDetail(route);
    window.scrollTo(0, 0);
  } else {
    app.innerHTML = renderHome();
    window.scrollTo(0, 0);
  }
}

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
window.addEventListener('hashchange', render);
render();
