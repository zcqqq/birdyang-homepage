function render() {
  const route = location.hash.slice(1) || 'home';
  const app = document.getElementById('app');

  if (route === 'home') {
    app.innerHTML = renderHome();
    window.scrollTo(0, 0);
  } else if (route === 'services') {
    app.innerHTML = renderHome();
    setTimeout(function(){ var el = document.getElementById('services'); if (el) { var nav = document.querySelector('nav'); var navH = nav ? nav.offsetHeight : 76; var t = el.getBoundingClientRect().top + window.scrollY - navH - 20; window.scrollTo({ top: t, behavior: 'smooth' }); } else { window.scrollTo(0, 0); } }, 50);
  } else if (route === 'team') {
    app.innerHTML = renderHome();
    setTimeout(function(){ var g = document.querySelector('.team-grid'); if (g) { var nav = document.querySelector('nav'); var navH = nav ? nav.offsetHeight : 76; var sec = g.closest('section'); var t = (sec || g).getBoundingClientRect().top + window.scrollY - navH - 20; window.scrollTo({ top: t, behavior: 'smooth' }); } }, 50);
  } else if (route === 'business-investor') {
    app.innerHTML = renderBusinessInvestor();
    window.scrollTo(0, 0);
  } else if (route.startsWith('team/')) {
    const id = route.replace('team/', '');
    app.innerHTML = renderTeamProfile(id);
    window.scrollTo(0, 0);
  } else if (servicePages[route]) {
    app.innerHTML = renderServiceDetail(route);
    window.scrollTo(0, 0);
  } else {
    app.innerHTML = renderHome();
    window.scrollTo(0, 0);
  }
}

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
window.addEventListener('hashchange', render);
render();

})();
</script>
