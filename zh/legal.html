<script>
(function() {
  var app = document.getElementById('app');

  /* --- ROUTES --- */
  var routes = {
    'home': renderHome,
    'immigration': renderImmigration
  };

  /* --- ROUTER --- */
  function navigate() {
    var hash = location.hash.slice(1) || 'home';
    var render = routes[hash] || renderHome;
    app.innerHTML = render();
    window.scrollTo(0, 0);
    initReveal();
  }

  window.addEventListener('hashchange', navigate);
  window.addEventListener('DOMContentLoaded', navigate);
  navigate();

  /* --- NAV SCROLL EFFECT --- */
  window.addEventListener('scroll', function() {
    var nav = document.querySelector('nav');
    if (window.scrollY > 60) {
      nav.classList.add('scrolled');
      nav.classList.remove('transparent');
    } else {
      nav.classList.remove('scrolled');
      nav.classList.add('transparent');
    }
  });

  /* --- SCROLL REVEAL --- */
  function initReveal() {
    var els = document.querySelectorAll('.reveal');
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.15 });
    els.forEach(function(el) { observer.observe(el); });
  }

  /* --- PAGE: #home (法务首页) --- */
  function renderHome() {
    return '' +
    '<div class="hero-banner hero-glow" style="background:url(../assets/images/02_LegalHome01_FirstSight.png) center/cover no-repeat">' +

      '<h1>法律业务</h1>' +
      '<p class="hero-sub">以专业指引方向，以清晰守护所托</p>' +
    '</div>' +

    '<section class="bg-cream reveal">' +
      '<div class="container">' +
        '<div class="section-label">关于我们的法律业务</div>' +
        '<div class="about-text">' +

        '</div>' +
        '<div class="steps" style="margin-top:40px">' +

        '</div>' +
      '</div>' +
    '</section>' +

    '<section class="bg-white reveal">' +
      '<div class="container">' +
        '<div class="section-label">服务范围</div>' +
        '<h2 class="section-title">我们的专业</h2>' +
        '<div class="cards-grid">' +
          '<a class="service-card" href="#immigration">' +
            '<div class="card-icon-area"><div class="icon-circle"><img src="../assets/icons/icon-immigration.svg" alt="移民"></div></div>' +
            '<div class="card-body"><h3>移民</h3><p>协助客户处理留学签证与移民签证，以定制专业方式配合申请与审批</p><span class="learn-more">了解更多 &rarr;</span></div>' +

            '<div class="card-icon-area"><div class="icon-circle"><img src="../assets/icons/icon-legal.svg" alt="房产"></div></div>' +

          '<div class="service-card">' +

          '<div class="service-card">' +
            '<div class="card-icon-area"><div class="icon-circle"><img src="../assets/icons/icon-legal.svg" alt="信托"></div></div>' +

            '<div class="card-icon-area"><div class="icon-circle"><img src="../assets/icons/icon-legal.svg" alt="诉讼"></div></div>' +

          '</div>' +
          '<div class="service-card">' +
            '<div class="card-icon-area"><div class="icon-circle"><img src="../assets/icons/icon-immigration.svg" alt="跨境"></div></div>' +

          '</div>' +
        '</div>' +
      '</div>' +

    '<section class="bg-cream reveal">' +
      '<div class="container">' +
        '<div class="section-label">我们的团队</div>' +
        '<h2 class="section-title">专业团队</h2>' +
        '<div class="team-grid">' +
          '<div class="team-card"><img src="../assets/team/marshall-bird.png" alt="Marshall Bird"><h4>Marshall Bird</h4><p>合伙人/大律师</p></div>' +
          '<div class="team-card"><img src="../assets/team/aimee-yang.png" alt="Aimee Yang"><h4>Aimee Yang</h4><p>合伙人/大律师</p></div>' +
          '<div class="team-card"><img src="../assets/team/julia-huang.png" alt="Julia Huang"><h4>Julia Huang</h4><p>大律师</p></div>' +
          '<div class="team-card"><img src="../assets/team/ming-lu.png" alt="Ming Lu"><h4>Ming Lu</h4><p>信托与财务经理</p></div>' +
          '<div class="team-card"><img src="../assets/team/cici-du.png" alt="Cici Du"><h4>Cici Du</h4><p>注册法律行政官</p></div>' +

        '</div>' +

            '<h2 style="font-size:1.2rem;font-weight:700;color:var(--blue);margin-bottom:24px">投资者1 / 投资者2</h2>' +

              '<div class="why-item"><h4>整合支持</h4><p>会计、商业与金融专业人士协同合作</p></div>' +
            '</div>' +
            '<a href="contact.html" class="cta-btn primary" style="width:100%;display:block;text-align:center">预约咨询</a>' +
