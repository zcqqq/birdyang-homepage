function render() {
  var hash = location.hash.slice(1) || 'home';
  var app = document.getElementById('app');

  if (hash.indexOf('team/') === 0) {
    var id = hash.slice(5);
    var html = renderTeamProfileHTML(id, { backHash: '#team', backText: '返回我们的团队', imgBase: '../' });
    app.innerHTML = html || renderHome();
    window.scrollTo(0, 0);
  } else if (hash === 'team') {
    app.innerHTML = renderHome();
    setTimeout(function(){ var g = document.querySelector('.team-grid'); if (g) { var nav = document.querySelector('nav'); var navH = nav ? nav.offsetHeight : 76; var sec = g.closest('section'); var t = (sec || g).getBoundingClientRect().top + window.scrollY - navH - 20; window.scrollTo({ top: t, behavior: 'smooth' }); } }, 50);
  } else {
    app.innerHTML = renderHome();
    window.scrollTo(0, 0);
  }
  document.querySelectorAll('.reveal').forEach(function(el) {
    new IntersectionObserver(function(entries, obs) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, {threshold: 0.1}).observe(el);
  });
}

window.addEventListener('hashchange', render);
render();

})();
