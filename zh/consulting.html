{
  "@context": "https://schema.org",
  "@type": "ProfessionalService",
  "name": "德扬集团咨询服务",

    "@type": "Organization",

  },
  "address": {

  },

}
</script>
</head>
<body>

<!-- NAVIGATION -->
<div id="site-nav"></div>
<script src="/components/nav.js"></script>
<script>renderNav({active:"consulting",lang:"zh"})</script>

<main id="app"></main>

<script src="/components/section-header.js"></script>
<script src="/components/team-profile.js"></script>
<script>
(function(){

function renderHome() {
  return `
  <div class="hero-banner hero-glow" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:url(../assets/images/28_ConsultingHome01_FirstSight.png) center/cover no-repeat">
    <h1>咨询服务</h1>
    <p class="hero-sub">专业协同，行稳致远</p>
  </div>

  <section class="bg-cream reveal">
    <div class="container">
      ${sectionAbout('关于我们的咨询服务', '在德扬，咨询服务连接保险、人力资源、移民及商业事务中的实际需求。</p><p>我们为个人、家庭与企业提供清晰、务实的咨询支持，协助客户了解选项、管理风险，并以更有把握的方式推进下一步。</p><p>我们与德扬法务和会计团队紧密协作，为客户提供更具整合视角的指导，将专业能力与实际需求相衔接。', {pMargin:'20px'})}
    </div>
  </section>

  <section class="bg-white reveal">
    <div class="container">
      ${sectionHeader('我们的专业', '服务领域')}
      <div class="cards-grid">
        <a class="service-card" href="insurance.html">
          <div class="card-icon-area" style="background:url(../assets/images/28_ConsultingHome02_Insurance.png) center/cover no-repeat;height:140px"></div>
          <div class="card-body">
            <h3>保险</h3>
            <p>清晰规划保障，稳妥管理风险</p>
            <span class="learn-more">了解更多 &rarr;</span>
          </div>
        </a>
        <a class="service-card" href="hr.html">
          <div class="card-icon-area" style="background:url(../assets/images/28_ConsultingHome03_HR.png) center/cover no-repeat;height:140px"></div>
          <div class="card-body">
            <h3>人力资源咨询</h3>
            <p>完善人事制度，助力企业稳健发展</p>
            <span class="learn-more">了解更多 &rarr;</span>
          </div>
        </a>
        <a class="service-card" href="immigration.html">
          <div class="card-icon-area" style="background:url(../assets/images/28_ConsultingHome04_Immigration.png) center/cover no-repeat;height:140px"></div>
          <div class="card-body">
            <h3>移民咨询</h3>
            <p>有序准备材料，稳步推进您的移民路径</p>
            <span class="learn-more">了解更多 &rarr;</span>
          </div>
        </a>
      </div>
    </div>
  </section>

  <section class="bg-cream reveal">
    <div class="container">
      ${renderTeamGrid(['aimee-yang','julia-huang','rockie-wei'], {lang:'zh', imgBase:'../'})}
    </div>
  </section>
  `;
}

function render() {
  var hash = location.hash.slice(1) || 'home';
  var app = document.getElementById('app');

  if (hash.indexOf('team/') === 0) {
    var id = hash.slice(5);
    var html = renderTeamProfileHTML(id, { lang:'zh', backHash: '#team', backText: '返回我们的团队', imgBase: '../' });
    app.innerHTML = html || renderHome();
    window.scrollTo(0, 0);
  } else if (hash === 'team') {
    app.innerHTML = renderHome();
    setTimeout(function(){ var g = document.querySelector('.team-grid'); if (g) { var nav = document.querySelector('nav'); var navH = nav ? nav.offsetHeight : 76; var sec = g.closest('section'); var t = (sec || g).getBoundingClientRect().top + window.scrollY - navH - 20; window.scrollTo({ top: t, behavior: 'smooth' }); } }, 50);
  } else {
    app.innerHTML = renderHome();
    window.scrollTo(0, 0);
  }
  document.querySelectorAll('.reveal').forEach(function(el) {
    new IntersectionObserver(function(entries, obs) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, {threshold: 0.1}).observe(el);
  });
}

window.addEventListener('hashchange', render);
render();

})();
</script>

<!-- FOOTER -->
<div id="site-footer"></div>
<script src="/components/footer.js"></script>
<script>renderFooter({lang:"zh"})</script>

<script src="/components/chatbot.js"></script>
<script>renderChatbot({lang:"zh"})</script>
</body>
</html>
