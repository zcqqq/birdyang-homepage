      bio: 'Ally Liao supports Bird & Yang\'s accounting and business advisory practice with a strong combination of accounting knowledge, commercial insight, and execution capability.',

  // --- RENDER FUNCTIONS ---

  function renderHome() {
    return `
      <div class="hero-banner hero-glow" style="background:url(../assets/images/17_AccountingHome01_FirstSight.png) center/cover no-repeat">
        <div class="hero-label">Accounting</div>
        <h1>ACCOUNTING SERVICES</h1>
        <p class="hero-sub">Building Wealth Through Better Numbers</p>
      </div>

      <section class="bg-cream">
        <div class="container">
          <div class="section-label">About</div>
          <h2 class="section-title">OUR APPROACH</h2>
          <div class="about-text reveal">
            <p>Behind every successful business is a clear set of numbers. At Bird & Yang, we go beyond compliance &mdash; we help you understand your financial position, make informed decisions, and build wealth with confidence. Working alongside our legal team, we provide integrated advice that sees the full picture of your business and personal finances.</p>

          <div class="section-label">What We Do</div>

                <div class="card-icon-area">

        <div class="container">
          <div class="section-label">Our People</div>
          <h2 class="section-title">OUR TEAM</h2>

            ${team.map(t => `

                <p>${t.role}</p>
              </div>
            `).join('')}
          </div>
        </div>
      </section>
    `;
  }

  function renderServiceDetail(id) {
    const data = serviceDetails[id];
    if (!data) return renderHome();

    return `
      <div class="hero-banner">
        <div class="hero-label">Accounting</div>
        <h1>${data.title}</h1>

      <section class="bg-cream">

          <a class="back-link" href="#home">Back to Accounting</a>
          <div class="two-col">
            <div class="main-content">
              <p class="about-text" style="text-align:left;margin:0 0 32px 0">${data.intro}</p>
              ${data.accordions.map(item => `
                <div class="accordion">
                  <div class="accordion-header">${item}</div>
                  <div class="accordion-body">
                    <p>Bird & Yang provides professional support across all aspects of ${item.toLowerCase()}, tailored to your specific needs and circumstances.</p>

                </div>

            </div>
          </div>
        </div>
      </section>

  function renderTeamProfile(id) {
    const data = teamProfiles[id];
    if (!data) return renderHome();

    return `
      <div class="hero-banner team-hero">
        <div class="hero-label">Our Team</div>
        <h1>${data.name}</h1>

        <div class="container">
          <a class="back-link" href="#home">Back to Accounting</a>
          <div class="profile-layout">
            <div>
              <img class="profile-photo" src="${data.photo}" alt="${data.name}">
            </div>
            <div>
              <h2 class="profile-name">${data.name}</h2>
              <p class="profile-role">${data.role}</p>
              <p class="profile-bio">${data.bio}</p>

              <div class="expertise-badges">
                ${data.expertise.map(e => `<span>${e}</span>`).join('')}
              </div>

              <div class="profile-highlights">
                ${data.highlights.map(h => `
                  <div class="highlight">
                    <h4>${h}</h4>
                  </div>
                `).join('')}
              </div>

              <div class="profile-contact">
                <p><strong>Phone:</strong> <a href="tel:${data.contact.phone}">${data.contact.phone}</a></p>
                <p><strong>Email:</strong> <a href="mailto:${data.contact.email}">${data.contact.email}</a></p>
                ${data.contact.qualifications ? `<p><strong>Qualifications:</strong> ${data.contact.qualifications}</p>` : ''}
              </div>
            </div>
          </div>
        </div>

    `;
  }

  // --- ROUTER ---
  const app = document.getElementById('app');

  function route() {
    const hash = location.hash.slice(1) || 'home';
    let html = '';

    if (hash === 'home') {
      html = renderHome();
    } else if (hash.startsWith('team/')) {
      const id = hash.replace('team/', '');
      html = renderTeamProfile(id);
    } else if (serviceDetails[hash]) {
      html = renderServiceDetail(hash);
    } else {
      html = renderHome();
    }

    app.innerHTML = html;
    window.scrollTo(0, 0);
    initAccordions();
    initReveal();
  }

  function initAccordions() {
    document.querySelectorAll('.accordion-header').forEach(header => {
      header.addEventListener('click', function() {
        const accordion = this.parentElement;
        accordion.classList.toggle('open');
      });
    });
  }

  function initReveal() {
    const reveals = document.querySelectorAll('.reveal');
    if (!reveals.length) return;
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.15 });
    reveals.forEach(el => observer.observe(el));
  }

  // Nav scroll effect
  const nav = document.querySelector('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 60);
  });

  // Listen for hash changes
  window.addEventListener('hashchange', route);
  // Initial route
  route();
})();
