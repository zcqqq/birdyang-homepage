/* ─── ROUTER ─── */
function route() {
  var hash = window.location.hash.slice(1) || 'home';
  var app = document.getElementById('app');
  switch(hash) {
    case 'book': app.innerHTML = renderBook(); break;
    default: app.innerHTML = renderHome(); break;
  }
  bindForms();
  bindTabs();
  revealElements();
  if (hash && hash !== 'home' && hash !== 'book') {
    setTimeout(function() {
      var el = document.getElementById(hash);
      if (el) { el.scrollIntoView({behavior:'smooth', block:'start'}); }
      else { window.scrollTo(0, 0); }
    }, 50);
  } else {
    window.scrollTo(0, 0);
  }
}

/* ─── FORM HANDLING ─── */
function submitForm(form, successId, btnText) {
  var btn = form.querySelector('button[type="submit"]');
  btn.disabled = true;
  btn.textContent = '发送中...';

  fetch('/api/contact', { method: 'POST', body: new FormData(form) })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.success) {
        form.style.display = 'none';
        document.getElementById(successId).style.display = 'block';
      } else {
        btn.disabled = false;
        btn.textContent = btnText;
        alert('发送失败，请重试或直接邮件联系 info@birdyang.co.nz');
      }
    })
    .catch(function() {
      btn.disabled = false;
      btn.textContent = btnText;
      alert('网络错误，请重试。');
    });
}

function bindForms() {
  var contactForm = document.getElementById('contact-form');
  if (contactForm) {
    contactForm.addEventListener('submit', function(e) {
      e.preventDefault();
      submitForm(contactForm, 'contact-success', '提交咨询');
    });
  }
  var bookForm = document.getElementById('book-form');
  if (bookForm) {
    bookForm.addEventListener('submit', function(e) {
      e.preventDefault();
      submitForm(bookForm, 'book-success', '提交预约');
    });
  }
}

/* ─── TABS ─── */
function bindTabs() {
  var tabs = document.querySelectorAll('#doc-tabs .tab');
  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      tabs.forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      var panels = document.querySelectorAll('[id^="doc-panel-"]');
      panels.forEach(function(p) { p.style.display = 'none'; });
      var target = document.getElementById('doc-panel-' + tab.getAttribute('data-tab'));
      if (target) target.style.display = '';
    });
  });
}

/* ─── SCROLL REVEAL ─── */
function revealElements() {
  var els = document.querySelectorAll('.reveal');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });
  els.forEach(function(el) { observer.observe(el); });
}

/* ─── NAV SCROLL EFFECT ─── */
window.addEventListener('scroll', function() {
  var nav = document.querySelector('nav');
  if (nav) {
    if (window.scrollY > 40) { nav.classList.add('scrolled'); }
    else { nav.classList.remove('scrolled'); }
  }
});

window.addEventListener('hashchange', route);
